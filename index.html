<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propósitos Interligados</title>

<style>
:root {
  --laranja: #f26522;
}

body {
  font-family: Arial;
  background: #fff;
  margin: 0;
}

.card {
  max-width: 400px;
  margin: 40px auto;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h1 {
  font-size: 26px;
  font-weight: bold;
}

button {
  width: 100%;
  padding: 12px;
  background: var(--laranja);
  color: white;
  border: none;
  border-radius: 8px;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="card">
  <h1>PROPÓSITOS INTERLIGADOS</h1>

  <input id="nome" placeholder="Seu nome">
  <input id="servico" placeholder="Serviço realizado">

  <button onclick="enviar()">Enviar Horas</button>

  <button onclick="verPainel()">Ver Painel</button>

  <ul id="lista"></ul>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 COLE SUAS CHAVES AQUI */
const firebaseConfig = {
  apiKey: "COLE_AQUI",
  authDomain: "COLE_AQUI",
  projectId: "COLE_AQUI"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const numeroEmpresa = "5599999999999"; // ALTERE

window.enviar = async function () {
  const nome = document.getElementById("nome").value;
  const servico = document.getElementById("servico").value;
  const hora = new Date().toLocaleTimeString();

  await addDoc(collection(db, "horas"), {
    nome,
    servico,
    hora
  });

  const msg = `📋 ENVIAR HORAS\n👤 ${nome}\n🛠 ${servico}\n⏰ ${hora}`;
  window.open(`https://wa.me/${numeroEmpresa}?text=${encodeURIComponent(msg)}`);
};

window.verPainel = async function () {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  const dados = await getDocs(collection(db, "horas"));

  dados.forEach(doc => {
    const d = doc.data();
    const li = document.createElement("li");
    li.innerText = `${d.nome} - ${d.servico} - ${d.hora}`;
    lista.appendChild(li);
  });
};
</script>

</body>
</html>
